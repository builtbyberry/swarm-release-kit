name: cli publish

# Publish @builtbyberry/srm-cli to npm from a `cli-v*` tag.
#
# Tag-driven, like the plugin: the tag IS the release. A manual `npm publish` from
# a laptop is how the plugin's 0.8.1 shipped untagged, and there is no reason to
# recreate that here with a second artifact.
#
# The tag prefix is `cli-v*`, NOT `v*`: `v*` belongs to the Claude plugin, and the
# two version independently (the plugin is 0.9.x while the CLI is 0.2.x). Sharing
# a prefix would make every plugin release try to publish the CLI.
on:
  push:
    tags: ['cli-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance: the OIDC token is what lets npm attest that
      # this tarball was built by this workflow from this repo.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Tag must match package.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # The CLI has no CHANGELOG, so its version lives in exactly two places:
          # the manifest and the tag. Refuse to publish when they disagree — a
          # published version that no tag points at is unreproducible, and a tag
          # that ships a different number is worse. This is the same rule the
          # plugin's release-coherence check enforces, at the only moment it can
          # be enforced for a package that has no changelog to cross-check.
          MANIFEST="$(node -p "require('./cli/srm/package.json').version")"
          EXPECTED="cli-v${MANIFEST}"

          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag ${TAG} does not match cli/srm/package.json (${MANIFEST}). Expected ${EXPECTED}."
            echo "Bump the manifest and re-tag, or tag the version you meant to ship."
            exit 1
          fi

          echo "Tag ${TAG} matches manifest ${MANIFEST}."

      - name: Test before publishing
        run: npm test
        working-directory: cli/srm

      - name: Publish
        # --provenance links the tarball to this commit + workflow on npm.
        # No install step: zero dependencies and no lockfile (see cli.yml).
        run: npm publish --provenance --access public
        working-directory: cli/srm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
